name: Prebuilds

on:
  push:
    tags:
      - "@isidorus/cpu@*"
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Which package to build prebuilds for"
        required: true
        default: "cpu"
        type: choice
        options: [cpu]

env:
  TF_VERSION: "2.18.1"

jobs:
  prebuild-cpu:
    name: "@isidorus/cpu / ${{ matrix.os }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install libtensorflow
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Linux" ]; then
            wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-linux-x86_64.tar.gz"
            sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz
            sudo ldconfig
            echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV
          elif [ "${{ runner.os }}" == "macOS" ]; then
            wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-darwin-${{ matrix.arch }}.tar.gz"
            sudo tar -C /usr/local -xzf libtensorflow-cpu-darwin-${{ matrix.arch }}.tar.gz
            echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV
          else
            pwsh -Command "Invoke-WebRequest -Uri 'https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-windows-x86_64.zip' -OutFile libtf.zip"
            pwsh -Command "Expand-Archive libtf.zip -DestinationPath C:\libtensorflow"
            echo "LIBTENSORFLOW_PATH=C:\libtensorflow" >> $env:GITHUB_ENV
            echo "C:\libtensorflow\lib" >> $env:GITHUB_PATH
          fi

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm ci --ignore-scripts
      - run: npm run build -w @isidorus/core
      - name: Prebuildify CPU
        run: npm run prebuildify -w @isidorus/cpu

      - uses: actions/upload-artifact@v4
        with:
          name: cpu-prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: packages/cpu/prebuilds/
          retention-days: 30
  commit-prebuilds:
    needs: prebuild-cpu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: packages/cpu/prebuilds/
          pattern: cpu-prebuilds-*
          merge-multiple: true

      - name: Commit and Push prebuilds
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cpu/prebuilds/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update prebuilt binaries [skip ci]"
            git push
          fi
