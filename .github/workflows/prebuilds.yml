name: Prebuilds

on:
  push:
    tags:
      - "@isidorus/cpu@*"
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to build"
        required: true
        default: "cpu"
        type: choice
        options: [cpu]

env:
  TF_VERSION: "2.18.1"

jobs:
  prebuild-cpu:
    name: "cpu / ${{ matrix.os }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install libtensorflow (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-linux-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz
          sudo ldconfig
          echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV

      - name: Install libtensorflow (macOS)
        if: runner.os == 'macOS'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-darwin-${{ matrix.arch }}.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-darwin-${{ matrix.arch }}.tar.gz
          echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV

      - name: Install libtensorflow (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile libtf.zip
          Expand-Archive libtf.zip -DestinationPath C:\libtensorflow
          echo "LIBTENSORFLOW_PATH=C:\libtensorflow" >> $env:GITHUB_ENV
          echo "C:\libtensorflow\lib" >> $env:GITHUB_PATH

      - run: npm ci
      - run: npm run build -w @isidorus/core
      - name: Prebuildify CPU
        run: npm run prebuildify -w @isidorus/cpu

      - uses: actions/upload-artifact@v4
        with:
          name: cpu-prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: packages/cpu/prebuilds/
          retention-days: 30
