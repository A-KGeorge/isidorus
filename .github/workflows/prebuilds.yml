name: Prebuilds (manual)

# This workflow exists for manual re-triggers and hotfix prebuild generation.
# The primary release prebuilds are built by the prebuild-cpu job in ci.yml,
# which runs as a dependency of the release job so prebuilds are always
# present before npm publish runs.
#
# Use this workflow to:
#   - Regenerate prebuilds after a hotfix without a full release
#   - Build a single platform prebuild for debugging
#   - Commit updated prebuilds to develop for testing

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build from"
        required: false
        default: "develop"
      target_branch:
        description: "Branch to commit prebuilds to"
        required: false
        default: "develop"

env:
  TF_VERSION: "2.18.1"

jobs:
  prebuild-cpu:
    name: "@isidorus/cpu / ${{ matrix.os }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install libtensorflow (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-linux-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz
          sudo ldconfig
          echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV

      - name: Install libtensorflow (macOS)
        if: runner.os == 'macOS'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-darwin-${{ matrix.arch }}.tar.gz"
          sudo tar -C /usr/local -xzf "libtensorflow-cpu-darwin-${{ matrix.arch }}.tar.gz"
          echo "LIBTENSORFLOW_PATH=/usr/local"    >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=/usr/local/lib" >> $GITHUB_ENV

      - name: Install libtensorflow (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-windows-x86_64.zip" -OutFile libtf.zip
          Expand-Archive libtf.zip -DestinationPath C:\libtensorflow
          echo "LIBTENSORFLOW_PATH=C:\libtensorflow" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\libtensorflow\lib"                | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm ci --ignore-scripts
      - run: npm run build -w @isidorus/core
      - run: npm run prebuildify -w @isidorus/cpu

      - uses: actions/upload-artifact@v4
        with:
          name: cpu-prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: packages/cpu/prebuilds/
          retention-days: 30

  commit-prebuilds:
    name: Commit prebuilds to ${{ inputs.target_branch }}
    needs: prebuild-cpu
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: packages/cpu/prebuilds/
          pattern: cpu-prebuilds-*
          merge-multiple: true

      - name: Commit and push prebuilds
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cpu/prebuilds/
          if git diff --staged --quiet; then
            echo "No new binaries to commit"
          else
            git commit -m "chore: update prebuilt binaries [skip ci]"
            git push origin ${{ inputs.target_branch }}
          fi
