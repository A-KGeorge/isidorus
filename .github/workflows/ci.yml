name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_DEFAULT: "22"
  TF_VERSION: "2.18.1"

jobs:
  # ---------------------------------------------------------------------------
  # 0. Detect which packages changed
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      core: ${{ steps.filter.outputs.core }}
      cpu: ${{ steps.filter.outputs.cpu }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'packages/core/**'
              - '.changeset/**'
            cpu:
              - 'packages/cpu/**'
              - '.changeset/**'
            ci:
              - '.github/workflows/**'

  # ---------------------------------------------------------------------------
  # 1. Install libtensorflow (Required for native dependencies)
  # ---------------------------------------------------------------------------
  install-libtensorflow:
    name: "libtensorflow / ${{ matrix.os }}"
    needs: changes
    if: needs.changes.outputs.cpu == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Cache libtensorflow
        id: cache-tf
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/include/tensorflow
            /usr/local/lib/libtensorflow*
            C:\libtensorflow
          key: libtensorflow-${{ env.TF_VERSION }}-${{ runner.os }}

      - name: Install (Linux)
        if: runner.os == 'Linux' && steps.cache-tf.outputs.cache-hit != 'true'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-linux-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz
          sudo ldconfig

      - name: Install (macOS)
        if: runner.os == 'macOS' && steps.cache-tf.outputs.cache-hit != 'true'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-darwin-arm64.tar.gz" || \
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-darwin-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-darwin-*.tar.gz

      - name: Install (Windows)
        if: runner.os == 'Windows' && steps.cache-tf.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile libtf.zip
          Expand-Archive libtf.zip -DestinationPath C:\libtensorflow

  # ---------------------------------------------------------------------------
  # 2. @isidorus/cpu tests
  # ---------------------------------------------------------------------------
  test-cpu:
    name: "@isidorus/cpu / ${{ matrix.os }} / Node ${{ matrix.node }}"
    needs: [changes, install-libtensorflow]
    if: needs.changes.outputs.cpu == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Restore libtensorflow
        id: cache-tf
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/include/tensorflow
            /usr/local/lib/libtensorflow*
            C:\libtensorflow
          key: libtensorflow-${{ env.TF_VERSION }}-${{ runner.os }}

      - name: Install libtensorflow (Linux)
        if: runner.os == 'Linux' && steps.cache-tf.outputs.cache-hit != 'true'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-linux-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz
          sudo ldconfig

      - name: Install libtensorflow (macOS)
        if: runner.os == 'macOS' && steps.cache-tf.outputs.cache-hit != 'true'
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            TF_ARCH="arm64"
          else
            TF_ARCH="x86_64"
          fi
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-darwin-${TF_ARCH}.tar.gz"
          sudo tar -C /usr/local -xzf "libtensorflow-cpu-darwin-${TF_ARCH}.tar.gz"

      - name: Install libtensorflow (Windows)
        if: runner.os == 'Windows' && steps.cache-tf.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile libtf.zip
          Expand-Archive libtf.zip -DestinationPath C:\libtensorflow

      - name: Set LIBTENSORFLOW_PATH
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            echo "LIBTENSORFLOW_PATH=C:\libtensorflow" >> $GITHUB_ENV
            echo "C:\libtensorflow\lib" >> $GITHUB_PATH
          else
            echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV
            if [ "${{ runner.os }}" == "Linux" ]; then sudo ldconfig; fi
          fi

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm ci
      - run: npm run build -w @isidorus/core
      - run: npm run build -w @isidorus/cpu
      - run: npm test -w @isidorus/cpu

  # ---------------------------------------------------------------------------
  # 3. @isidorus/core tests
  # ---------------------------------------------------------------------------
  test-core:
    name: "@isidorus/core / ${{ matrix.os }}"
    needs: [changes]
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_DEFAULT }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build -w @isidorus/core
      - run: npm test -w @isidorus/core

  # ---------------------------------------------------------------------------
  # 4. Release
  # ---------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test-core, test-cpu]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_DEFAULT }}
          registry-url: "https://registry.npmjs.org"

      - name: Restore libtensorflow
        id: cache-tf
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/include/tensorflow
            /usr/local/lib/libtensorflow*
          key: libtensorflow-${{ env.TF_VERSION }}-Linux

      - name: Install libtensorflow (Linux)
        if: steps.cache-tf.outputs.cache-hit != 'true'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-linux-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz
          sudo ldconfig

      - name: Set LIBTENSORFLOW_PATH
        run: |
          echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm ci --ignore-scripts
      - run: npm run build
      - uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run publish-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
