name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_DEFAULT: "24"
  TF_VERSION: "2.18.1"

# ---------------------------------------------------------------------------
# Helper: installs libtensorflow and sets LIBTENSORFLOW_PATH + LD path.
# Shared across multiple jobs via a composite action or inline steps.
# ---------------------------------------------------------------------------

jobs:
  # ---------------------------------------------------------------------------
  # 0. Detect which packages changed
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      core: ${{ steps.filter.outputs.core }}
      cpu: ${{ steps.filter.outputs.cpu }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'packages/core/**'
              - '.changeset/**'
            cpu:
              - 'packages/cpu/**'
              - '.changeset/**'
            ci:
              - '.github/workflows/**'

  # ---------------------------------------------------------------------------
  # 1. @isidorus/core tests (pure TypeScript, no native build needed)
  # ---------------------------------------------------------------------------
  test-core:
    name: "@isidorus/core / ${{ matrix.os }}"
    needs: changes
    if: |
      github.ref == 'refs/heads/main'     ||
      github.ref == 'refs/heads/develop'  ||
      needs.changes.outputs.core == 'true' ||
      needs.changes.outputs.ci   == 'true' ||
      github.event_name == 'pull_request'  ||
      github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_DEFAULT }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build -w @isidorus/core
      - run: npm test  -w @isidorus/core

  # ---------------------------------------------------------------------------
  # 2. @isidorus/cpu tests (requires libtensorflow + native build)
  # ---------------------------------------------------------------------------
  test-cpu:
    name: "@isidorus/cpu / ${{ matrix.os }} / Node ${{ matrix.node }}"
    needs: changes
    if: |
      github.ref == 'refs/heads/main'    ||
      github.ref == 'refs/heads/develop' ||
      needs.changes.outputs.cpu == 'true' ||
      needs.changes.outputs.ci  == 'true' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["20", "22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install libtensorflow + set env (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-linux-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz
          sudo ldconfig
          echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV

      - name: Install libtensorflow + set env (macOS)
        if: runner.os == 'macOS'
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x86_64/;s/arm64/arm64/')
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-darwin-${ARCH}.tar.gz"
          sudo tar -C /usr/local -xzf "libtensorflow-cpu-darwin-${ARCH}.tar.gz"
          echo "LIBTENSORFLOW_PATH=/usr/local"   >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=/usr/local/lib" >> $GITHUB_ENV

      - name: Install libtensorflow + set env (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-windows-x86_64.zip" -OutFile libtf.zip
          Expand-Archive libtf.zip -DestinationPath C:\libtensorflow
          echo "LIBTENSORFLOW_PATH=C:\libtensorflow" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\libtensorflow\lib"                | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm ci --ignore-scripts
      - run: npm run build -w @isidorus/core
      - run: npm run build -w @isidorus/cpu
      - run: npm test  -w @isidorus/cpu

  # ---------------------------------------------------------------------------
  # 3. Build prebuilds (main-branch pushes only — these are bundled into the
  #    npm release.  Each runner produces a platform-specific .node file via
  #    prebuildify, which is then uploaded as a GitHub Actions artifact and
  #    downloaded by the release job before it calls `changeset publish`.)
  #
  # Why here instead of prebuilds.yml:
  #   Changesets publishes FIRST and creates the git tag after the fact.
  #   If prebuilds run on the tag they arrive too late — the package is already
  #   published without them.  Running prebuilds as a dependency of the release
  #   job in this file guarantees they are present before npm publish runs.
  # ---------------------------------------------------------------------------
  prebuild-cpu:
    name: "Prebuild @isidorus/cpu / ${{ matrix.os }}"
    needs: [test-core, test-cpu]
    # Only run on main pushes that will trigger a release.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            tf_url_suffix: linux-x86_64.tar.gz
            tf_extract: "sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz && sudo ldconfig"
            tf_env: "LIBTENSORFLOW_PATH=/usr/local"
          - os: windows-latest
            arch: x64
            tf_url_suffix: windows-x86_64.zip
            tf_extract: 'pwsh -Command "Expand-Archive libtf.zip -DestinationPath C:\libtensorflow"'
            tf_env: "LIBTENSORFLOW_PATH=C:\\libtensorflow"
          - os: macos-latest
            arch: arm64
            tf_url_suffix: darwin-arm64.tar.gz
            tf_extract: "sudo tar -C /usr/local -xzf libtensorflow-cpu-darwin-arm64.tar.gz"
            tf_env: "LIBTENSORFLOW_PATH=/usr/local"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20" # prebuildify targets Node 18/20/22/24 — build host is 20
          cache: npm

      - name: Install libtensorflow (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          FNAME="libtensorflow-cpu-${{ matrix.tf_url_suffix }}"
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/${FNAME}"
          ${{ matrix.tf_extract }}
          echo "${{ matrix.tf_env }}" >> $GITHUB_ENV

      - name: Install libtensorflow (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-${{ matrix.tf_url_suffix }}" -OutFile libtf.zip
          Expand-Archive libtf.zip -DestinationPath C:\libtensorflow
          echo "LIBTENSORFLOW_PATH=C:\libtensorflow" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\libtensorflow\lib"                | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm ci --ignore-scripts
      - run: npm run build -w @isidorus/core

      - name: Run prebuildify
        run: npm run prebuildify -w @isidorus/cpu

      - name: Upload prebuild artifacts
        uses: actions/upload-artifact@v4
        with:
          # Unique name per platform so download-artifact can merge them.
          name: cpu-prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: packages/cpu/prebuilds/
          retention-days: 7 # only needed until the release job consumes them

  # ---------------------------------------------------------------------------
  # 4. Release — download all prebuilds, then run changesets publish.
  #    Depends on prebuild-cpu so all .node files exist before npm publish.
  # ---------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test-core, test-cpu, prebuild-cpu]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_DEFAULT }}
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Download prebuilds from all three platform jobs into the correct path.
      # actions/download-artifact with merge-multiple:true flattens the three
      # artifact directories so prebuilds/ ends up as a flat tree:
      #   packages/cpu/prebuilds/linux-x64/node.napi.node
      #   packages/cpu/prebuilds/win32-x64/node.napi.node
      #   packages/cpu/prebuilds/darwin-arm64/node.napi.node
      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/cpu/prebuilds/
          pattern: cpu-prebuilds-*
          merge-multiple: true

      - name: Verify prebuilds are present
        run: |
          echo "Prebuild tree:"
          find packages/cpu/prebuilds -name "*.node" | sort
          COUNT=$(find packages/cpu/prebuilds -name "*.node" | wc -l)
          if [ "$COUNT" -lt 3 ]; then
            echo "::error::Expected at least 3 prebuilds, found ${COUNT}"
            exit 1
          fi

      # libtensorflow is needed for the release build step on Linux.
      - name: Install libtensorflow (Linux)
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-linux-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz
          rm libtensorflow-cpu-linux-x86_64.tar.gz
          sudo ldconfig
          echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm ci --ignore-scripts
      - run: npm run build

      - uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run publish-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
