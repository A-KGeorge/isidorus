name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        # Installs root and workspace dependencies
        run: npm ci

      - name: Type-check and Build
        # Runs 'tsc' in packages/core via root script
        run: npm run build

      - name: Run Tests
        # Executes workspace test scripts
        run: npm test

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-and-test # Ensure tests pass before trying to publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Changesets to see git history

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: npm ci

      - name: Build Packages
        run: npm run build # Ensure dist/ files are generated for publishing

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          # This will create a PR when changesets are found,
          # or publish to NPM if the version was bumped.
          version: npm run version
          publish: npm run publish-packages
          commit: "ci(release): version packages"
          title: "ci(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
